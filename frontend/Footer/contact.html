<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuadStock - Contact Support</title>
    <link rel="stylesheet" href="quicklink.css">
    <link rel="stylesheet" href="../Shared/Vendor/font-awesome/css/all.min.css">
</head>

<body>

    <!-- Shared Navigation -->
    <nav class="component-nav">
        <div class="nav-brand">Quad<span>Stock</span></div>
        <a href="../landing/landing.html" class="back-link">
            <i class="fa-solid fa-arrow-left"></i> Back to Home
        </a>
    </nav>

    <div class="container contact-section">
        <div class="contact-hero">
            <h1>We're here to help</h1>
            <p style="color: var(--text-muted);">Have questions about QuadStock? Reach out to our 24/7 support team.</p>
        </div>

        <div class="contact-grid">
            <div class="contact-card">
                <div class="icon-box"><i class="fa-solid fa-phone"></i></div>
                <h3>Phone Support</h3>
                <p style="color: var(--text-muted); margin: 0.5rem 0;">Direct line for premium stores</p>
                <p style="font-weight: bold;">+91 98765 43210</p>
            </div>
            <div class="contact-card">
                <div class="icon-box"><i class="fa-solid fa-envelope"></i></div>
                <h3>Email Us</h3>
                <p style="color: var(--text-muted); margin: 0.5rem 0;">Response within 2 hours</p>
                <p style="font-weight: bold;">support@quadstock.in</p>
            </div>
            <div class="contact-card">
                <div class="icon-box"><i class="fa-solid fa-location-dot"></i></div>
                <h3>Headquarters</h3>
                <p style="color: var(--text-muted); margin: 0.5rem 0;">Patna, Bihar, India</p>
            </div>
        </div>

        <!-- Support Form -->
        <form id="contact-form" class="support-form">
            <h2 style="margin-bottom: 2rem;">Send us a Message</h2>
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" class="form-control" placeholder="Shambhu" required>
            </div>
            <div class="form-group">
                <label>Shop Name</label>
                <input type="text" class="form-control" placeholder="Shambhu Kirana">
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea class="form-control" rows="5" placeholder="How can we help you?" required></textarea>
            </div>
            <button type="submit" class="btn-send">Send Message</button>
        </form>
    </div>

    <script src="quicklink.js"></script>
</body>

</html>
