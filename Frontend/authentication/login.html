<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuadStock - Login</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Background Elements -->
    <div class="market-pattern"></div>
    <!-- Interactive Background Container managed by JS -->
    <div id="interactive-bg" class="interactive-bg"></div>

    <div class="auth-container">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Enter your credentials to access your dashboard</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="login-id">Owner Email or Owner ID</label>
                <div class="input-wrapper">
                    <input type="text" id="login-id" class="form-control"
                        placeholder="e.g. owner@example.com or QS-1023">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="Enter your password">
                    <span class="input-icon">
                        <i class="fa-regular fa-eye"></i>
                    </span>
                </div>
            </div>

            <div id="login-error" class="error-message"
                style="color: #ef4444; font-size: 0.9rem; margin-bottom: 1rem; display: none; text-align: center; background: rgba(239, 68, 68, 0.1); padding: 0.5rem; border-radius: 0.5rem; border: 1px solid rgba(239, 68, 68, 0.2);">
            </div>

            <button type="submit" class="btn-submit">Login</button>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Register Shop</a></p>
            </div>
        </form>
    </div>

    <script src="auth.js"></script>
</body>

</html>
