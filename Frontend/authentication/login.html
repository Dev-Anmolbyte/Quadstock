<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuadStock - Owner Login</title>
    <link rel="stylesheet" href="../Shared/Styles/global.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="../Shared/Vendor/font-awesome/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../Shared/Auth/guard.js"></script>
    <script src="auth.js" type="module" defer></script>
    <script src="../Shared/Utils/offline.js" defer></script>
</head>

<body>
    <!-- Background Elements -->
    <div class="market-pattern"></div>
    <!-- Interactive Background Container managed by JS -->
    <div id="interactive-bg" class="interactive-bg"></div>

    <div class="auth-container">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p>Enter your credentials to access your dashboard</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="login-id">Owner Email or Username</label>
                <div class="input-wrapper">
                    <input type="text" id="login-id" class="form-control"
                        placeholder="Email or username" required aria-required="true">


                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="Password" required
                        aria-required="true">


                    <button type="button" class="input-icon" aria-label="Show password">
                        <i class="fa-solid fa-eye" aria-hidden="true"></i>
                    </button>

                </div>
            </div>

            <div id="login-error" class="error-message" role="alert" aria-live="polite"
                style="color: #ef4444; font-size: 0.9rem; margin-bottom: 1rem; display: none; text-align: center; background: rgba(239, 68, 68, 0.1); padding: 0.5rem; border-radius: 0.5rem; border: 1px solid rgba(239, 68, 68, 0.2);">
            </div>

            <button type="submit" class="btn-submit">Login</button>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Register Shop</a></p>
                <p style="margin-top: 0.5rem; opacity: 0.8; font-size: 0.85rem;"><a href="forgot_password.html"
                        class="forgot-link">Forgot Password?</a></p>
                <p style="margin-top: 1rem; border-top: 1px solid rgba(0,0,0,0.1); padding-top: 0.5rem;">
                    <a href="employee_login.html" style="color: var(--text-muted); font-weight: normal;">Employee Login
                        <i class="fa-solid fa-arrow-right" style="font-size: 0.8em;"></i></a>
                </p>
            </div>
        </form>
    </div>
</body>

</html>
