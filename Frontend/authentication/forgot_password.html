<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuadStock - Forgot Password</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="forgot_password.js" type="module" defer></script>
</head>

<body>
    <!-- Background Elements -->
    <div class="market-pattern"></div>
    <div id="interactive-bg" class="interactive-bg"></div>

    <div class="auth-container">
        <div class="auth-header">
            <h2>Reset Password</h2>
            <p>Follow the steps to recover your account</p>
        </div>

        <form id="forgot-password-form">
            <!-- Step 1: User Verification -->
            <div id="step-1">
                <div class="form-group">
                    <label for="owner-id">Owner ID</label>
                    <div class="input-wrapper">
                        <input type="text" id="owner-id" class="form-control" placeholder="e.g. QS-12345" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Registered Email</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="form-control" placeholder="e.g. owner@example.com"
                            required>
                    </div>
                </div>

                <button type="button" id="btn-send-otp" class="btn-submit">Send OTP</button>
            </div>

            <!-- Step 2: OTP Verification -->
            <div id="step-2" style="display: none;">
                <div class="success-message"
                    style="background: rgba(34, 197, 94, 0.1); color: #22c55e; padding: 0.5rem; border-radius: 0.5rem; margin-bottom: 1rem; text-align: center;">
                    <i class="fa-solid fa-check-circle"></i> OTP Sent to your email!
                </div>
                <!-- Logic Note: In a real app, this would be an input. For simulation, we alert the OTP. -->
                <div class="form-group">
                    <label for="otp-input">Enter OTP</label>
                    <div class="input-wrapper">
                        <input type="text" id="otp-input" class="form-control" placeholder="Enter 6-digit OTP"
                            maxlength="6" required>
                    </div>
                </div>

                <button type="button" id="btn-verify-otp" class="btn-submit">Verify OTP</button>
                <button type="button" id="btn-back-step1" class="btn-secondary"
                    style="width: 100%; margin-top: 0.5rem; background: transparent; border: 1px solid #ddd; color: #666;">Back</button>
            </div>

            <!-- Step 3: New Password -->
            <div id="step-3" style="display: none;">
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="new-password" class="form-control" placeholder="Enter new password"
                            required>
                        <button type="button" class="input-icon" aria-label="Toggle password visibility">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                    <!-- Password Strength Meter -->
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-segment" id="strength-segment"></div>
                        </div>
                        <span class="strength-text" id="strength-text"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm New Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="confirm-password" class="form-control"
                            placeholder="Confirm new password" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Reset Password</button>
            </div>

            <div class="auth-footer">
                <p>Remembered your password? <a href="login.html">Login</a></p>
            </div>
        </form>
    </div>
</body>

</html>
