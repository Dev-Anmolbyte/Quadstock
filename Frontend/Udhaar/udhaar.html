<!DOCTYPE html>
<html lang="en">

<head>
    <script src="../Shared/Auth/guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuadStock - Udhaar Record</title>
    <!-- Fonts -->
    <link href="../Shared/Vendor/google-fonts/plus-jakarta-sans.css"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="../Shared/Vendor/font-awesome/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="../Shared/Styles/global.css">
    <link rel="stylesheet" href="../Shared/Styles/sidebar.css">
    <link rel="stylesheet" href="udhaar.css">
</head>

<body>
    <div class="layout-container">
        <!-- Sidebar (populated by sidebar.js) -->
        <aside class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar injected by sidebar.js -->


            <!-- Content -->
            <div class="udhaar-container">
                <!-- Stats Row -->
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-icon red-bg"><i class="fa-solid fa-file-invoice-dollar"></i></div>
                        <div class="stat-info">
                            <p class="label">Total Udhaar</p>
                            <h3 id="total-udhaar-amount">₹0.00</h3>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange-bg"><i class="fa-solid fa-clock"></i></div>
                        <div class="stat-info">
                            <p class="label">Pending Records</p>
                            <h3 id="pending-count">0</h3>
                        </div>
                    </div>
                    <button class="btn-add-udhaar" id="btn-add-udhaar">
                        <i class="fa-solid fa-plus"></i> Add New Record
                    </button>

                </div>

                <!-- Table Section -->
                <div class="card table-card">
                    <div class="card-header">
                        <h3>Customer Credit Records</h3>
                        <div class="search-box">
                            <i class="fa-solid fa-search"></i>
                            <input type="text" id="search-udhaar" placeholder="Search by customer name...">
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="udhaar-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Due Date</th>
                                    <th>Customer Name</th>
                                    <th>Contact</th>
                                    <th>Description</th>
                                    <th>Amount (₹)</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="udhaar-table-body">
                                <!-- JS will populate this -->
                                <tr>
                                    <td colspan="7" style="text-align:center; padding: 2rem;">No records found.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Record Modal -->
    <div class="modal" id="add-udhaar-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Udhaar Record</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="udhaar-form">
                <div class="form-group">
                    <label for="u-date">Date</label>
                    <input type="date" id="u-date" required>
                </div>
                <div class="form-group">
                    <label for="u-due-date">Expected Payment Date</label>
                    <input type="date" id="u-due-date" required>
                </div>
                <div class="form-group">
                    <label for="u-name">Customer Name</label>
                    <input type="text" id="u-name" placeholder="Enter customer name" required>
                </div>
                <div class="form-group">
                    <label for="u-contact">Contact Number</label>
                    <input type="tel" id="u-contact" placeholder="Enter phone number" maxlength="10">
                </div>
                <div class="form-group">
                    <label for="u-amount">Amount (₹)</label>
                    <input type="number" id="u-amount" placeholder="0.00" min="0" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="u-desc">Description</label>
                    <textarea id="u-desc" placeholder="Items purchased / Note" rows="3"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel close-modal">Cancel</button>
                    <button type="submit" class="btn-submit">Save Record</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../Shared/Utils/offline.js"></script>
    <script src="udhaar.js" type="module"></script>
    <script>window.ACTIVE_PAGE = 'udhaar';</script>
    <script src="../Shared/Components/sidebar.js"></script>
</body>

</html>
