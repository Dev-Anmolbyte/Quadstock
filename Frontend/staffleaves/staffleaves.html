<!DOCTYPE html>
<html lang="en">
<head>
    <script src="../Shared/Auth/guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuadStock - Staff Leaves</title>
    <!-- Fonts -->
    <link rel="stylesheet" href="../Shared/Vendor/google-fonts/plus-jakarta-sans.css">
    <!-- Icons -->
    <link rel="stylesheet" href="../Shared/Vendor/font-awesome/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="../Shared/Styles/global.css">
    <link rel="stylesheet" href="../Shared/Styles/sidebar.css">
    <link rel="stylesheet" href="../Shared/Components/quad-modals.css">
    <link rel="stylesheet" href="staffleaves.css">
</head>
<body>
    <div class="layout-container">
        <!-- Sidebar -->
        <aside class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="content-scrollable">
                <!-- Header Section -->
                <div class="page-header">
                    <div class="header-info">
                        <h1 class="page-title">Leave Management</h1>
                        <p class="page-subtitle">Request and manage employee leave applications</p>
                    </div>
                    <div class="header-actions" id="staff-only-actions">
                        <button id="btn-apply-leave" class="btn-primary">
                            <i class="fa-solid fa-plus"></i> Apply for Leave
                        </button>
                    </div>
                </div>

                <!-- Stats Overview -->
                <div class="stats-grid">
                    <div class="stat-card pending">
                        <div class="stat-icon"><i class="fa-solid fa-clock"></i></div>
                        <div class="stat-data">
                            <span class="stat-label">Pending</span>
                            <h3 id="stat-pending">0</h3>
                        </div>
                    </div>
                    <div class="stat-card approved">
                        <div class="stat-icon"><i class="fa-solid fa-check-circle"></i></div>
                        <div class="stat-data">
                            <span class="stat-label">Approved</span>
                            <h3 id="stat-approved">0</h3>
                        </div>
                    </div>
                    <div class="stat-card rejected">
                        <div class="stat-icon"><i class="fa-solid fa-times-circle"></i></div>
                        <div class="stat-data">
                            <span class="stat-label">Rejected</span>
                            <h3 id="stat-rejected">0</h3>
                        </div>
                    </div>
                </div>

                <!-- Filters & Controls -->
                <div class="controls-bar">
                    <div class="filter-group">
                        <button class="filter-btn active" data-status="all">All</button>
                        <button class="filter-btn" data-status="pending">Pending</button>
                        <button class="filter-btn" data-status="approved">Approved</button>
                        <button class="filter-btn" data-status="rejected">Rejected</button>
                    </div>
                    <div class="search-box">
                        <i class="fa-solid fa-search"></i>
                        <input type="text" id="search-leaves" placeholder="Search by reason or staff name...">
                    </div>
                </div>

                <!-- Leaves List -->
                <div class="leaves-container" id="leaves-list">
                    <!-- Dynamic content -->
                    <div class="loading-state">
                        <i class="fa-solid fa-spinner fa-spin"></i>
                        <p>Loading leave records...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Apply Leave Modal -->
    <div id="leave-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Apply for Leave</h3>
                <button class="close-modal"><i class="fa-solid fa-x"></i></button>
            </div>
            <form id="leave-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="startDate">Start Date</label>
                        <input type="date" id="startDate" required>
                    </div>
                    <div class="form-group">
                        <label for="endDate">End Date</label>
                        <input type="date" id="endDate" required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reason">Reason for Leave</label>
                    <textarea id="reason" placeholder="Explain the reason for your leave request..." required rows="4"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary close-modal">Cancel</button>
                    <button type="submit" class="btn-primary">Submit Request</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Status Update Modal (Owner only) -->
    <div id="status-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Review Leave Request</h3>
                <button class="close-modal"><i class="fa-solid fa-x"></i></button>
            </div>
            <form id="status-form">
                <input type="hidden" id="target-leave-id">
                <div class="request-preview" id="request-preview">
                    <!-- Dynamic preview -->
                </div>
                <div class="form-group">
                    <label for="adminNote">Admin Note (Optional)</label>
                    <textarea id="adminNote" placeholder="Add a note or reason for your decision..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-secondary btn-reject" data-status="rejected">Reject</button>
                    <button type="button" class="btn-primary btn-approve" data-status="approved">Approve</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../Shared/Utils/api.js" type="module"></script>
    <script src="../Shared/Components/sidebar.js"></script>
    <script src="../Shared/Components/quad-modals.js"></script>
    <script>window.ACTIVE_PAGE = 'staffleaves';</script>
    <script src="staffleaves.js" type="module"></script>
</body>
</html>
