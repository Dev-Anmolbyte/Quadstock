<!DOCTYPE html>
<html lang="en">

<head>
    <script src="../Shared/Auth/guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuadStock - Queries</title>
    <!-- Fonts -->
    <link href="../Shared/Vendor/google-fonts/plus-jakarta-sans.css"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="../Shared/Vendor/font-awesome/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="../Shared/Styles/global.css">
    <link rel="stylesheet" href="../Ownerdashboard/dashboard.css" id="dashboard-css">
    <link rel="stylesheet" href="query.css">
</head>

<body>
    <div class="layout-container">
        <!-- Sidebar (populated by sidebar.js) -->
        <aside class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar injected by sidebar.js -->


            <!-- Query Content -->
            <div class="query-section">
                <div class="query-header">
                    <div>
                        <h1>Query Box</h1>
                        <p style="color:var(--text-secondary); margin-top:0.5rem;">Handle and track staff and customer
                            queries
                        </p>
                    </div>
                    <button id="btn-raise-query" class="btn-primary">
                        <i class="fa-solid fa-plus"></i> Raise New Query
                    </button>
                </div>

                <div class="queries-list" id="queries-list">
                    <!-- Loaded via JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Raise Query Modal -->
    <div id="raise-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Submit a Query</h3>
            <div class="form-group">
                <label for="staff-name">Name</label>
                <input type="text" id="staff-name" placeholder="Name of person asking..."
                    onkeyup="if(event.key === 'Enter') document.getElementById('btn-modal-submit').click()">
            </div>
            <div class="form-group">
                <label for="staff-role">Role/Type</label>
                <select id="staff-role">
                    <option value="Sales Staff">Sales Staff</option>
                    <option value="Inventory Clerk">Inventory Clerk</option>
                    <option value="Cashier">Cashier</option>
                    <option value="Security">Security</option>
                    <option value="Staff">Staff</option>

                    <option value="Owner">Owner</option>
                    <option value="Customer">Customer</option>
                </select>
            </div>
            <div class="form-group">
                <label for="query-subject">Subject</label>
                <input type="text" id="query-subject" placeholder="Query topic"
                    onkeyup="if(event.key === 'Enter') document.getElementById('btn-modal-submit').click()">
            </div>
            <div class="form-group">
                <label for="query-desc">Description</label>
                <textarea id="query-desc" rows="4" placeholder="Type your query details here..."></textarea>

                <div class="image-upload-area">
                    <div class="upload-btn-wrapper">
                        <button class="btn-upload"><i class="fa-solid fa-camera"></i> Photos/Docs</button>
                        <input type="file" id="query-files" accept="image/*" multiple>
                    </div>
                    <span style="font-size: 0.75rem; color: var(--text-secondary); align-self: center;">Max 5
                        attachments</span>
                </div>
                <div id="image-preview-container" class="image-preview-container"></div>
            </div>
            <div class="modal-actions">
                <button id="btn-modal-cancel" class="btn-cancel">Cancel</button>
                <button id="btn-modal-submit" class="btn-submit">Submit Query</button>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <div style="font-size: 3rem; color: #0d9488; margin-bottom: 1rem;">
                <i class="fa-solid fa-circle-question"></i>
            </div>
            <h3 style="margin-bottom: 1rem;">Mark as Seen?</h3>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">Do you want to mark this query as seen? It
                will be moved to the resolved section.</p>
            <div class="modal-actions" style="justify-content: center;">
                <button id="btn-confirm-cancel" class="btn-cancel">Cancel</button>
                <button id="btn-confirm-proceed" class="btn-submit"
                    style="background: #0d9488; box-shadow: 0 10px 15px -3px rgba(13, 148, 136, 0.3);">Yes, Mark
                    Seen</button>
            </div>
        </div>
    </div>

    <script src="../Shared/Utils/offline.js"></script>
    <script>window.ACTIVE_PAGE = 'query';</script>
    <script src="../Shared/Components/sidebar.js"></script>
    <script src="query.js" type="module"></script>
</body>

</html>
