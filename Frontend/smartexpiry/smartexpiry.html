<!DOCTYPE html>
<html lang="en">

<head>
    <script src="../Shared/Auth/guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuadStock - Smart Expiry</title>
    <!-- Fonts -->
    <link href="../Shared/Vendor/google-fonts/plus-jakarta-sans.css"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="../Shared/Vendor/font-awesome/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="../Shared/Styles/global.css">
    <link rel="stylesheet" href="../Shared/Styles/sidebar.css">
    <link rel="stylesheet" href="../Ownerdashboard/dashboard.css">
    <link rel="stylesheet" href="../Shared/Components/quad-modals.css">
    <link rel="stylesheet" href="smartexpiry.css">
</head>

<body>
    <div class="layout-container">
        <!-- Sidebar (populated by sidebar.js) -->
        <aside class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar injected by sidebar.js -->


            <!-- Main Content Area -->
            <div class="content-scrollable">
                <!-- Stats Row -->
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-icon red-bg"><i class="fa-solid fa-triangle-exclamation"></i></div>
                        <div class="stat-info">
                            <p class="label">Expired</p>
                            <h3 id="stat-expired">0</h3>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon orange-bg"><i class="fa-solid fa-hourglass-end"></i></div>
                        <div class="stat-info">
                            <p class="label">Expiring (7 Days)</p>
                            <h3 id="stat-7days">0</h3>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon yellow-bg"><i class="fa-solid fa-hourglass-half"></i></div>
                        <div class="stat-info">
                            <p class="label" id="label-warning-days">Expiring (30 Days)</p>
                            <h3 id="stat-30days">0</h3>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon green-bg"><i class="fa-solid fa-check-circle"></i></div>
                        <div class="stat-info">
                            <p class="label">Healthy Stock</p>
                            <h3 id="stat-healthy">0</h3>
                        </div>
                    </div>
                </div>

                <!-- Filters -->
                <div class="filter-bar">
                    <button class="filter-btn active" data-filter="all">All Items</button>
                    <button class="filter-btn" data-filter="high-stock"><i class="fa-solid fa-arrow-trend-up"></i> High Stock</button>
                    <button class="filter-btn" data-filter="7days"><i class="dot dot-red"></i> Expiring in 7
                        Days</button>
                    <button class="filter-btn" data-filter="14days"><i class="dot dot-orange"></i> Expiring in 14
                        Days</button>
                    <button class="filter-btn" data-filter="30days"><i class="dot dot-yellow"></i> Expiring in 30
                        Days</button>
                    <button class="filter-btn" data-filter="expired"><i class="fa-solid fa-ban"></i> Already
                        Expired</button>
                </div>

                <!-- Controls: Search & Sort -->
                <div class="controls-bar">
                    <div class="search-wrapper">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="search-input" placeholder="Search product, batch, category...">
                    </div>
                    <div class="sort-wrapper">
                        <span class="sort-label">Sort by:</span>
                        <select id="sort-select">
                            <option value="expiry-asc">Expiry (Earliest First)</option>
                            <option value="expiry-desc">Expiry (Latest First)</option>
                            <option value="name-asc">Name (A-Z)</option>
                            <option value="quantity-desc">Quantity (High to Low)</option>
                        </select>
                        <button id="settings-btn" class="filter-btn" style="margin-left: 10px; padding: 0.6rem; border-radius: 0.8rem;" title="Configure High Stock Threshold">
                            <i class="fa-solid fa-gear"></i>
                        </button>
                    </div>
                </div>

                <!-- Bulk Actions -->
                <div class="bulk-actions" id="bulk-actions">
                    <div class="selected-info">
                        <strong><span id="selected-count">0</span> Items</strong>
                        <span>Selected</span>
                    </div>
                    <button class="action-btn btn-discount"><i class="fa-solid fa-tags"></i> Apply Discount</button>
                    <button class="action-btn btn-return"><i class="fa-solid fa-truck-ramp-box"></i> Return to Vendor</button>
                    <button class="action-btn btn-dispose"><i class="fa-solid fa-trash-can"></i> Dispose / Write-off</button>
                </div>

                <!-- Timeline List -->
                <div class="expiry-timeline" id="expiry-list">
                    <!-- Javascript will populate this -->
                </div>
            </div>
        </main>
    </div>

    <!-- Action Modal -->
    <div id="action-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title">Action</h3>
            <div id="modal-body">
                <!-- Dynamic Content -->
            </div>
            <div class="modal-footer">
                <button id="modal-cancel" class="modal-btn btn-cancel">Cancel</button>
                <button id="modal-confirm" class="modal-btn btn-confirm">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <script src="../Shared/Utils/offline.js"></script>
    <script>window.ACTIVE_PAGE = 'smartexpiry';</script>
    <script src="../Shared/Components/quad-modals.js"></script>
    <script src="../Shared/Components/sidebar.js"></script>
    <script src="smartexpiry.js" type="module"></script>
</body>

</html>
