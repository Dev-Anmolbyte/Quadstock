<!DOCTYPE html>
<html lang="en">

<head>
    <script src="../Shared/Auth/guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuadStock - Complaints</title>
    <!-- Fonts -->
    <link href="../Shared/Vendor/google-fonts/plus-jakarta-sans.css"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="../Shared/Vendor/font-awesome/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="../Shared/Styles/global.css">
    <link rel="stylesheet" href="../Shared/Styles/sidebar.css">
    <link rel="stylesheet" href="complain.css">
</head>

<body>
    <div class="layout-container">
        <!-- Sidebar (populated by sidebar.js) -->
        <aside class="sidebar"></aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar injected by sidebar.js -->


            <!-- Complaint Content -->
            <div class="complain-section">
                <div class="complain-header">
                    <div>
                        <h1>Complaint Box</h1>
                        <p style="color:var(--text-secondary); margin-top:0.5rem;">Manage and resolve staff complaints
                        </p>
                    </div>
                    <button id="btn-raise-complaint" class="btn-primary">
                        <i class="fa-solid fa-plus"></i> Raise New Complaint
                    </button>
                </div>

                <div class="complaints-list" id="complaints-list">
                    <!-- Loaded via JS -->
                </div>
            </div>
        </main>
    </div>

    <!-- Raise Complaint Modal (Simulating Staff View) -->
    <div id="raise-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Raise a Complaint</h3>
            <div class="form-group">
                <label for="staff-name">Staff Name</label>
                <input type="text" id="staff-name" placeholder="e.g. Ramesh Kumar"
                    onkeyup="if(event.key === 'Enter') document.getElementById('btn-modal-submit').click()">
            </div>
            <div class="form-group">
                <label for="staff-role">Role</label>
                <select id="staff-role">
                    <option value="Sales Staff">Sales Staff</option>
                    <option value="Inventory Clerk">Inventory Clerk</option>
                    <option value="Cashier">Cashier</option>
                    <option value="Security">Security</option>
                    <option value="Staff">Staff</option>

                    <option value="Owner">Owner</option>
                </select>
            </div>
            <div class="form-group">
                <label for="complaint-subject">Subject</label>
                <input type="text" id="complaint-subject" placeholder="Brief summary"
                    onkeyup="if(event.key === 'Enter') document.getElementById('btn-modal-submit').click()">
            </div>
            <div class="form-group">
                <label for="complaint-desc">Description</label>
                <textarea id="complaint-desc" rows="4" placeholder="Describe the issue in detail..."></textarea>

                <div class="image-upload-area">
                    <div class="upload-btn-wrapper">
                        <button class="btn-upload"><i class="fa-solid fa-camera"></i> Phone/Video</button>
                        <input type="file" id="complaint-files" accept="image/*" multiple>
                    </div>
                    <span style="font-size: 0.75rem; color: var(--text-secondary); align-self: center;">Max 5
                        images</span>
                </div>
                <div id="image-preview-container" class="image-preview-container"></div>
            </div>
            <div class="modal-actions">
                <button id="btn-modal-cancel" class="btn-cancel">Cancel</button>
                <button id="btn-modal-submit" class="btn-submit">Submit Complaint</button>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 400px; text-align: center;">
            <div style="font-size: 3rem; color: #ef4444; margin-bottom: 1rem;">
                <i class="fa-solid fa-circle-question"></i>
            </div>
            <h3 style="margin-bottom: 1rem;">Are you sure?</h3>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">Do you really want to close this complaint?
                This action cannot be undone easily.</p>
            <div class="modal-actions" style="justify-content: center;">
                <button id="btn-confirm-cancel" class="btn-cancel">No, Keep Open</button>
                <button id="btn-confirm-proceed" class="btn-submit"
                    style="background: #ef4444; box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.3);">Yes, Close
                    It</button>
            </div>
        </div>
    </div>

    <script src="../Shared/Utils/offline.js"></script>
    <script>window.ACTIVE_PAGE = 'complaints';</script>
    <script src="../Shared/Components/sidebar.js"></script>
    <script src="complain.js" type="module"></script>
</body>

</html>
