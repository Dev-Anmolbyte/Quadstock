<!DOCTYPE html>
<html lang="en">

<head>
    <script src="../Shared/Auth/guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuadStock - POS Terminal</title>
    <!-- Fonts -->
    <link href="../Shared/Vendor/google-fonts/plus-jakarta-sans.css" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="../Shared/Vendor/font-awesome/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="../Shared/Styles/global.css">
    <link rel="stylesheet" href="../Shared/Styles/sidebar.css">
    <link rel="stylesheet" href="sales.css">
</head>

<body>
    <div class="layout-container">
        <!-- Sidebar -->
        <aside class="sidebar"></aside>

        <!-- Main POS Interface -->
        <main class="main-content">
            <div class="pos-container">
                <!-- Left: Product Discovery -->
                <div class="pos-left">
                    <div class="pos-card search-section">
                        <div class="search-tabs">
                            <button id="tab-barcode" class="tab-btn active"><i class="fa-solid fa-barcode"></i> Barcode Scan</button>
                            <button id="tab-manual" class="tab-btn"><i class="fa-solid fa-keyboard"></i> Manual Search</button>
                        </div>

                        <div id="barcode-view" class="tab-content">
                            <div class="barcode-input-group">
                                <i class="fa-solid fa-search"></i>
                                <input type="text" id="barcode-input" placeholder="Scan product barcode..." autofocus>
                            </div>
                            <p class="hint-text">Waiting for scanner input...</p>
                        </div>

                        <div id="manual-view" class="tab-content" style="display: none;">
                            <div class="manual-search-group">
                                <div class="search-input-wrapper">
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                    <input type="text" id="manual-search" placeholder="Type product name or brand...">
                                </div>
                                <div id="search-results" class="results-dropdown custom-scrollbar" style="display: none;">
                                    <!-- Search results populate here -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Loose Quantity Modal/Input Area -->
                    <div id="loose-input-area" class="pos-card loose-selection" style="display: none;">
                        <div class="selected-loose-info">
                            <div class="loose-icon"><i class="fa-solid fa-scale-balanced"></i></div>
                            <div class="loose-details">
                                <h3 id="loose-item-name">Product Name</h3>
                                <p id="loose-item-price">₹0.00 / kg</p>
                            </div>
                        </div>
                        <div class="loose-form">
                            <div class="input-field">
                                <label>Enter Weight / Quantity (<span id="loose-unit-label">kg</span>)</label>
                                <div class="weight-input-group">
                                    <input type="number" id="loose-qty-input" step="0.001" placeholder="0.000">
                                    <span class="unit-overlay" id="loose-unit-overlay">kg</span>
                                </div>
                            </div>
                            <div class="calculated-price">
                                <span>Total Price:</span>
                                <strong id="loose-total-price">₹0.00</strong>
                            </div>
                            <button id="add-loose-to-cart" class="btn-primary-pos"><i class="fa-solid fa-plus"></i> Add to Cart</button>
                            <button id="cancel-loose" class="btn-secondary-pos">Cancel</button>
                        </div>
                    </div>

                    <!-- Recent/Top Products Quick Grid -->
                    <div class="pos-card quick-grid-section">
                        <h4 class="section-title">Quick Add</h4>
                        <div id="quick-grid" class="product-grid">
                            <!-- Quick items populated via JS -->
                        </div>
                    </div>
                </div>

                <!-- Right: Cart & Checkout -->
                <div class="pos-right">
                    <div class="pos-card cart-container">
                        <div class="cart-header">
                            <h3><i class="fa-solid fa-shopping-cart"></i> Cart</h3>
                            <button id="clear-cart" class="btn-clear-cart" title="Clear all items"><i class="fa-solid fa-rotate-right"></i></button>
                        </div>

                        <div id="cart-items" class="cart-items-list custom-scrollbar">
                            <div class="empty-cart-state">
                                <i class="fa-solid fa-cart-shopping"></i>
                                <p>Cart is empty</p>
                            </div>
                        </div>

                        <div class="cart-footer">
                            <div class="summary-line">
                                <span>Subtotal</span>
                                <span id="cart-subtotal">₹0.00</span>
                            </div>
                            <div class="summary-line">
                                <span>Tax (0%)</span>
                                <span id="cart-tax">₹0.00</span>
                            </div>
                            <div class="summary-total">
                                <span>Total Payable</span>
                                <span id="cart-total">₹0.00</span>
                            </div>
                            
                            <button id="checkout-btn" class="btn-checkout disabled" disabled>
                                <span>Confirm Sale</span>
                                <i class="fa-solid fa-arrow-right"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="pos-lite-modal" style="display: none;">
        <div class="modal-content">
            <div class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
            <h3>Sale Recorded!</h3>
            <p id="success-msg">Total: ₹0.00</p>
            <button id="new-sale-btn" class="btn-primary-pos">New Sale</button>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        window.ACTIVE_PAGE = 'sales';
        window.HIDE_TOP_BAR = true;
    </script>
    <script src="../Shared/Components/sidebar.js"></script>
    <script src="../Shared/Components/quad-modals.js"></script>
    <script src="sales.js" type="module"></script>
</body>

</html>
